{% extends 'users/base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="container">
    <div class="row justify-content-center mt-5">
        <div class="col-md-6 col-lg-5">
            <!-- Карточка с тенью для выделения формы -->
            <div class="card shadow-lg border-0 rounded-lg">
                <div class="card-header bg-primary text-white text-center py-3">
                    <h3 class="font-weight-light my-1">Создание аккаунта</h3>
                </div>
                <div class="card-body p-4">
                    <form method="POST">
                        {% csrf_token %}
                        
                        <!-- Используем crispy для красивого рендеринга полей -->
                        {{ form.as_p}}
                        
                        <div class="form-group mt-4 mb-0">
                            <button class="btn btn-primary btn-block w-100 shadow-sm" type="submit">
                                Зарегистрироваться
                            </button>
                        </div>
                    </form>
                </div>
                <div class="card-footer text-center py-3 bg-light">
                    <div class="small">
                        <span class="text-muted">Уже есть аккаунт?</span> 
                        <a href="{% url 'login' %}" class="text-primary font-weight-bold ml-1">Войти</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
